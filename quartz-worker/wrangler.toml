name = "quartz-signal"
main = "src/index.ts"
compatibility_date = "2026-03-30"

[[r2_buckets]]
binding = "QUARTZ_R2"
bucket_name = "quartz-state"

[[durable_objects.bindings]]
name = "QUARTZ_ROOM"
class_name = "QuartzRoom"

[[migrations]]
tag = "v1"
new_classes = ["QuartzRoom"]

[vars]
ALLOWED_ORIGIN = "https://hidden.seaof.glass"
